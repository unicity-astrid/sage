[package]
name = "sage-completion"
version = "0.1.0"
description = "Anthropic API LLM provider (per-turn completion, bypasses Agent SDK credit)"
authors = [
    "Joshua J. Bouw <dev@joshuajbouw.com>",
    "Unicity Labs <info@unicity-labs.com>",
]
astrid-version = ">=0.7.0"

[[component]]
id = "sage-completion"
file = "sage_completion.wasm"
type = "executable"

[exports]
"astrid:llm" = "1.0.0"

[publish]
"llm.v1.stream.sage" = { wit = "@unicity-astrid/wit/llm/stream-event" }
"llm.v1.response.describe" = { wit = "@unicity-astrid/wit/llm/describe-response" }

[subscribe]
"llm.v1.request.describe" = { wit = "@unicity-astrid/wit/llm/describe-request", handler = "llm_describe" }
"llm.v1.request.generate.sage" = { wit = "@unicity-astrid/wit/llm/generate-request", handler = "handle_llm_request" }

[capabilities]
net = ["api.anthropic.com"]

[env]
api_key = { type = "secret", request = "Enter your Anthropic API key", placeholder = "sk-ant-..." }
model = { type = "string", request = "Default model ID", default = "claude-sonnet-4-6", placeholder = "claude-sonnet-4-6" }
context_window = { type = "integer", request = "Context window (tokens)", default = "200000", placeholder = "200000" }
max_output_tokens = { type = "integer", request = "Max output tokens per turn", default = "8192", placeholder = "8192" }
temperature = { type = "string", request = "Default temperature (0.0-1.0, blank = provider default)", placeholder = "1.0" }
