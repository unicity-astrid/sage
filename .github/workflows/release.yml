name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.94.0"
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      # Componentize with astrid-build (from the astrid release) rather than a
      # raw `cargo build` wasm. `astrid capsule install` expects a `.capsule`
      # archive (wasm component + manifest + bundled WIT), not a core module;
      # publishing raw wasm forces install into the clone-and-build fallback
      # that needs a Rust toolchain. The astrid repo is public, so the
      # capsule's GITHUB_TOKEN can read its release assets.
      - name: Fetch astrid-build from the astrid release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download --repo unicity-astrid/astrid \
            --pattern 'astrid-*-x86_64-unknown-linux-gnu.tar.gz' --dir /tmp/astrid-cli
          tar xzf /tmp/astrid-cli/*.tar.gz -C /tmp/astrid-cli
          echo "$(dirname "$(find /tmp/astrid-cli -name astrid-build -type f | head -1)")" >> "$GITHUB_PATH"

      # Sage is a monorepo: one capsule per crate. Build each crate dir
      # explicitly — astrid-build packages a single package, and the workspace
      # root is virtual (no [package]) so `astrid-build .` would fail. Each run
      # writes dist/<crate>.capsule, which the distro installer selects by name
      # (a release ships sage.capsule / sage-mcp.capsule / sage-install.capsule /
      # sage-completion.capsule, not one ambiguous archive).
      - name: Build .capsule archives (one per capsule crate)
        run: |
          for crate in sage sage-mcp sage-install sage-completion; do
            astrid-build "crates/$crate" --output dist
          done
          ls -la dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.capsule
          generate_release_notes: true
